schema_version: "1.0"
journal:
  name: "IEEE Transactions on Power Electronics (TPE)"
  article_types:
    regular_paper:
      max_pages: 10
      max_words: null
      max_figures: null
      required_sections: [abstract, introduction, body, conclusion, references]
    letter:
      max_pages: 4
      max_words: null
      max_figures: 6
      required_sections: [abstract, introduction, body, conclusion, references]
  default_type: "regular_paper"
  figure_dpi_min: 300
  figure_colorspace: "RGB"
  figure_formats: [".eps", ".pdf", ".png", ".jpg", ".tiff"]
  figure_width_max_inches: 7.0
  max_tables: null
  citation_style: "ieee"
  supplementary_required: false
  supplementary_extensions: [".pdf"]
