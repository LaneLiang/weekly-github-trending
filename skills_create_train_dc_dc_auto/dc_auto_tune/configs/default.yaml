# Default configuration for LLM-RL co-driven DC-DC converter auto-tuning

circuit:
  vin: 12.0
  vout_ref: 5.0
  L: 0.0001        # 100 uH
  C: 0.0001        # 100 uF
  R_load: 5.0
  f_sw: 100000     # 100 kHz
  rds_on: 0.05
  esr_c: 0.01

sac:
  actor_lr: 0.0003
  critic_lr: 0.0003
  alpha_lr: 0.0003
  gamma: 0.99
  tau: 0.005
  batch_size: 256
  buffer_size: 100000
  hidden_dim: 256
  n_hidden: 2
  initial_alpha: 0.2

reward_weights:
  w_ev: 1.0
  w_vr: 1.0
  w_eff: 0.5
  w_os: 0.8
  w_us: 0.8
  w_tr: 0.8
  w_ts: 0.5

meta:
  llm_provider: "openai"   # DeepSeek uses OpenAI-compatible API
  llm_model: "deepseek-chat"
  llm_base_url: "https://api.deepseek.com"
  intervention_interval: 50
  temperature: 0.2
  max_suggestion_magnitude: 0.5

perturbation:
  enabled: true
  max_esr_ratio: 2.5    # ESR aging: up to 2.5x nominal
  min_L_ratio: 0.8       # inductance degradation: down to 80%
  min_C_ratio: 0.7       # capacitance degradation: down to 70%
  vin_ripple: 0.1         # input voltage variation: +/-10%
  load_spread: 0.5        # load variation: 50%-150% nominal

train:
  n_episodes: 1000
  steps_per_episode: 500
  warmup_steps: 5000
  update_every: 1
  random_seed: 42
